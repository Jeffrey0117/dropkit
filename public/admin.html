<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | DropKit</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      background: #f5f5f0;
      color: #222;
      min-height: 100vh;
    }

    /* Login */
    .login-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f0; z-index: 100;
    }
    .login-box {
      background: #fff;
      border: 3px solid #000;
      border-radius: 12px;
      padding: 36px;
      text-align: center;
      max-width: 340px; width: 90%;
    }
    .login-box h2 {
      font-size: 20px; font-weight: 900;
      margin-bottom: 20px; letter-spacing: -1px;
    }
    .login-box input {
      width: 100%; padding: 12px 14px;
      border: 2px solid #eee; border-radius: 8px;
      background: #fff; color: #222;
      font-size: 14px; font-family: inherit;
      margin-bottom: 12px; outline: none;
    }
    .login-box input:focus { border-color: #000; }
    .login-box button {
      width: 100%; padding: 12px;
      border: 3px solid #000; border-radius: 8px;
      background: #000; color: #fff;
      font-size: 12px; font-weight: 800;
      font-family: inherit; cursor: pointer;
      text-transform: uppercase; letter-spacing: 1px;
      transition: all 0.15s;
    }
    .login-box button:hover { background: #333; border-color: #333; }
    .login-error { color: #e74c3c; font-size: 12px; font-weight: 700; margin-top: 8px; }
    .hidden { display: none !important; }

    /* Dashboard */
    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; padding-bottom: 16px;
      border-bottom: 2px solid #eee;
      flex-wrap: wrap; gap: 8px;
    }
    header h1 { font-size: 20px; font-weight: 900; letter-spacing: -1px; }

    .header-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .btn {
      padding: 6px 14px; border-radius: 6px;
      border: 2px solid #ddd; background: #fff;
      color: #222; font-size: 11px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      text-decoration: none; display: inline-flex; align-items: center;
      text-transform: uppercase; letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .btn:hover { border-color: #000; color: #000; }
    .btn-primary { background: #000; color: #fff; border-color: #000; }
    .btn-primary:hover { background: #333; border-color: #333; }
    .btn-danger:hover { border-color: #e74c3c; color: #e74c3c; }

    /* Stats */
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border: 2px solid #eee;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      transition: border-color 0.15s;
    }
    .stat-card:hover { border-color: #000; }
    .stat-card .num { font-size: 32px; font-weight: 900; color: #000; }
    .stat-card .label {
      font-size: 11px; font-weight: 700;
      color: #999; margin-top: 4px;
      text-transform: uppercase; letter-spacing: 1px;
    }

    /* Table */
    .table-wrap {
      background: #fff;
      border: 3px solid #000;
      border-radius: 12px;
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th {
      text-align: left; padding: 12px 14px;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #999; background: #fafaf5;
      border-bottom: 2px solid #eee; white-space: nowrap;
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid #eee;
      vertical-align: top;
      max-width: 220px; word-break: break-word;
    }
    tr:hover td { background: #fafaf5; }
    tr.selected td { background: #f0f0ea; }
    a.file-link { color: #000; font-weight: 700; text-decoration: none; }
    a.file-link:hover { text-decoration: underline; }
    .time { color: #bbb; font-size: 11px; white-space: nowrap; }
    .empty-state { text-align: center; padding: 48px 20px; color: #999; font-weight: 600; }

    /* Checkbox */
    .cb-col { width: 36px; text-align: center; }
    input[type="checkbox"] {
      accent-color: #000; width: 15px; height: 15px; cursor: pointer;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
    }
    .modal {
      background: #fff;
      border: 3px solid #000;
      border-radius: 12px;
      padding: 28px;
      max-width: 560px; width: 90%;
    }
    .modal h3 {
      font-size: 18px; font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }
    .modal .field { margin-bottom: 14px; }
    .modal label {
      display: block; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #999; margin-bottom: 4px;
    }
    .modal input, .modal textarea {
      width: 100%; padding: 10px 14px; border-radius: 8px;
      border: 2px solid #eee; background: #fff;
      color: #222; font-size: 13px; outline: none;
      font-family: inherit;
    }
    .modal input:focus, .modal textarea:focus { border-color: #000; }
    .modal textarea { min-height: 120px; resize: vertical; }
    .modal .recipients {
      font-size: 12px; color: #999; font-weight: 600;
      margin-bottom: 12px;
      padding: 10px 14px;
      background: #fafaf5;
      border-radius: 8px;
      border: 2px solid #eee;
    }
    .modal .recipients strong { color: #000; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .btn-send {
      padding: 10px 24px; border-radius: 8px;
      border: 3px solid #000; background: #000;
      color: #fff; font-size: 12px; font-weight: 800;
      font-family: inherit; cursor: pointer;
      text-transform: uppercase; letter-spacing: 1px;
      transition: all 0.15s;
    }
    .btn-send:hover { background: #333; border-color: #333; }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-cancel {
      padding: 10px 24px; border-radius: 8px;
      border: 2px solid #ddd; background: #fff;
      color: #222; font-size: 12px; font-weight: 700;
      font-family: inherit; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: #000; }
    .send-result { font-size: 12px; font-weight: 700; margin-top: 8px; }
    .send-result.success { color: #2ecc71; }
    .send-result.error { color: #e74c3c; }
  </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>DropKit Admin</h2>
    <input type="password" id="passwordInput" placeholder="Password" autofocus>
    <button onclick="doLogin()">Enter</button>
    <div class="login-error hidden" id="loginError">Incorrect password</div>
  </div>
</div>

<div class="container hidden" id="dashboard">
  <header>
    <h1>DropKit Admin</h1>
    <div class="header-actions">
      <button class="btn" onclick="openEmailModal('selected')">Email Selected</button>
      <button class="btn" onclick="openEmailModal('all')">Email All</button>
      <button class="btn btn-primary" onclick="openEmailModal('custom')">Email Custom</button>
      <a class="btn" id="exportBtn" href="#">Export CSV</a>
      <button class="btn btn-danger" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <div class="stats-row" id="statsRow"></div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Email Modal -->
<div class="modal-overlay hidden" id="emailModal">
  <div class="modal">
    <h3>Send Email</h3>
    <div class="recipients" id="emailRecipients"></div>
    <div class="field hidden" id="customEmailField">
      <label>Recipients</label>
      <textarea id="customEmailInput" placeholder="user1@example.com&#10;user2@example.com&#10;user3@example.com" style="min-height:80px"></textarea>
    </div>
    <div class="field">
      <label>Subject</label>
      <input type="text" id="emailSubject" placeholder="Email subject">
    </div>
    <div class="field">
      <label>Message</label>
      <textarea id="emailBody" placeholder="Write your message... (HTML supported)"></textarea>
    </div>
    <div class="send-result hidden" id="sendResult"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEmailModal()">Cancel</button>
      <button class="btn-send" id="sendBtn" onclick="sendEmail()">Send</button>
    </div>
  </div>
</div>

<script>
  let password = sessionStorage.getItem('dk_admin_pw') || ''
  let fields = []
  let allSubmissions = []
  let selectedIds = new Set()
  let emailMode = 'all'

  const $ = id => document.getElementById(id)

  if (password) tryAuth()

  $('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin()
  })

  function doLogin() {
    password = $('passwordInput').value
    tryAuth()
  }

  async function tryAuth() {
    try {
      const res = await fetch('/api/admin/stats?pw=' + encodeURIComponent(password), {
        headers: { 'x-admin-password': password }
      })
      if (!res.ok) {
        $('loginError').classList.remove('hidden')
        sessionStorage.removeItem('dk_admin_pw')
        return
      }
      sessionStorage.setItem('dk_admin_pw', password)
      $('loginOverlay').classList.add('hidden')
      $('dashboard').classList.remove('hidden')
      $('exportBtn').href = '/api/admin/export?pw=' + encodeURIComponent(password)
      loadAll()
    } catch {
      $('loginError').classList.remove('hidden')
    }
  }

  function doLogout() {
    sessionStorage.removeItem('dk_admin_pw')
    password = ''
    $('loginOverlay').classList.remove('hidden')
    $('dashboard').classList.add('hidden')
    $('passwordInput').value = ''
    $('loginError').classList.add('hidden')
  }

  function apiPost(p, body) {
    const sep = p.includes('?') ? '&' : '?'
    return fetch(p + sep + 'pw=' + encodeURIComponent(password), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': password },
      body: JSON.stringify(body),
    }).then(r => r.json())
  }

  function api(p) {
    const sep = p.includes('?') ? '&' : '?'
    return fetch(p + sep + 'pw=' + encodeURIComponent(password), {
      headers: { 'x-admin-password': password }
    }).then(r => r.json())
  }

  function fmtTime(iso) {
    if (!iso) return '-'
    const d = new Date(iso)
    const pad = n => String(n).padStart(2, '0')
    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`
  }

  function esc(str) {
    if (!str) return ''
    const d = document.createElement('div')
    d.textContent = str
    return d.innerHTML
  }

  function isUrl(str) {
    return typeof str === 'string' && (str.startsWith('http://') || str.startsWith('https://'))
  }

  async function loadAll() {
    const [stats, data] = await Promise.all([
      api('/api/admin/stats'),
      api('/api/admin/submissions'),
    ])
    fields = data.fields || []
    allSubmissions = data.submissions || []
    renderStats(stats)
    renderTable(allSubmissions)
  }

  function renderStats(s) {
    $('statsRow').innerHTML = `
      <div class="stat-card"><div class="num">${s.total}</div><div class="label">Total</div></div>
      <div class="stat-card"><div class="num">${s.today}</div><div class="label">Today</div></div>
    `
  }

  function toggleAll(checked) {
    selectedIds = checked ? new Set(allSubmissions.map(s => s.id)) : new Set()
    document.querySelectorAll('.row-cb').forEach(cb => { cb.checked = checked })
    updateRowHighlights()
  }

  function toggleRow(id, checked) {
    if (checked) selectedIds.add(id)
    else selectedIds.delete(id)
    updateRowHighlights()
  }

  function updateRowHighlights() {
    document.querySelectorAll('tr[data-id]').forEach(tr => {
      tr.classList.toggle('selected', selectedIds.has(tr.dataset.id))
    })
  }

  function renderTable(list) {
    $('tableHead').innerHTML = '<tr>' +
      '<th class="cb-col"><input type="checkbox" onchange="toggleAll(this.checked)"></th>' +
      fields.map(f => `<th>${esc(f.label)}</th>`).join('') +
      '<th>Time</th></tr>'

    if (!list.length) {
      $('tableBody').innerHTML = `<tr><td colspan="${fields.length + 2}" class="empty-state">No submissions yet</td></tr>`
      return
    }

    $('tableBody').innerHTML = list.map(sub => {
      const cells = fields.map(f => {
        const val = sub.data[f.name]
        if (isUrl(val)) {
          return `<td><a class="file-link" href="${esc(val)}" target="_blank">${esc(f.label)}</a></td>`
        }
        return `<td>${esc(val || '-')}</td>`
      }).join('')
      return `<tr data-id="${esc(sub.id)}">
        <td class="cb-col"><input type="checkbox" class="row-cb" onchange="toggleRow('${esc(sub.id)}', this.checked)"></td>
        ${cells}
        <td><span class="time">${fmtTime(sub.createdAt)}</span></td>
      </tr>`
    }).join('')
  }

  // ── Email ─────────────────────────────────────────

  function getEmailField() {
    return fields.find(f => f.type === 'email')
  }

  function openEmailModal(mode) {
    emailMode = mode
    const customField = $('customEmailField')
    const customInput = $('customEmailInput')

    if (mode === 'custom') {
      customField.classList.remove('hidden')
      customInput.value = ''
      $('emailRecipients').innerHTML = 'Paste your email list below, then compose your message.'
    } else {
      customField.classList.add('hidden')
      const emailField = getEmailField()
      if (!emailField) {
        alert('No email field in form config')
        return
      }

      let targets
      if (mode === 'selected') {
        if (selectedIds.size === 0) {
          alert('Select at least one submission')
          return
        }
        targets = allSubmissions.filter(s => selectedIds.has(s.id))
      } else {
        targets = allSubmissions
      }

      const emails = targets.map(s => s.data[emailField.name]).filter(Boolean)
      $('emailRecipients').innerHTML = `Sending to <strong>${emails.length}</strong> recipient${emails.length === 1 ? '' : 's'}: ${emails.slice(0, 5).map(esc).join(', ')}${emails.length > 5 ? '...' : ''}`
    }

    $('emailSubject').value = ''
    $('emailBody').value = ''
    $('sendResult').classList.add('hidden')
    $('sendBtn').disabled = false
    $('sendBtn').textContent = 'SEND'
    $('emailModal').classList.remove('hidden')
  }

  function closeEmailModal() {
    $('emailModal').classList.add('hidden')
  }

  function parseCustomEmails(text) {
    return text
      .split(/[\n,;]+/)
      .map(e => e.trim())
      .filter(e => e.includes('@'))
  }

  async function sendEmail() {
    const subject = $('emailSubject').value.trim()
    const body = $('emailBody').value.trim()

    if (!subject || !body) {
      showSendResult('Please fill in subject and message', true)
      return
    }

    const payload = { subject }

    if (emailMode === 'custom') {
      const customEmails = parseCustomEmails($('customEmailInput').value)
      if (customEmails.length === 0) {
        showSendResult('No valid emails found in the list', true)
        return
      }
      payload.emails = customEmails
    } else {
      payload.ids = emailMode === 'selected' ? [...selectedIds] : []
    }

    payload.html = body.includes('<') ? body : body.replace(/\n/g, '<br>')

    $('sendBtn').disabled = true
    $('sendBtn').textContent = 'SENDING...'

    try {
      const result = await apiPost('/api/admin/send-email', payload)

      if (result.success) {
        showSendResult(`Sent: ${result.sent}, Failed: ${result.failed}`, false)
        if (result.failed === 0) {
          setTimeout(closeEmailModal, 1500)
        }
      } else {
        showSendResult(result.error || 'Send failed', true)
      }
    } catch {
      showSendResult('Network error', true)
    }

    $('sendBtn').disabled = false
    $('sendBtn').textContent = 'SEND'
  }

  function showSendResult(msg, isError) {
    const el = $('sendResult')
    el.textContent = msg
    el.className = 'send-result ' + (isError ? 'error' : 'success')
    el.classList.remove('hidden')
  }

  // Live count for custom email input
  $('customEmailInput').addEventListener('input', () => {
    const count = parseCustomEmails($('customEmailInput').value).length
    $('emailRecipients').innerHTML = count > 0
      ? `<strong>${count}</strong> recipient${count === 1 ? '' : 's'} detected`
      : 'Paste your email list below, then compose your message.'
  })

  // Close modal on overlay click
  $('emailModal').addEventListener('click', (e) => {
    if (e.target === $('emailModal')) closeEmailModal()
  })
</script>
</body>
</html>
