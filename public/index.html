<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>DropKit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: #08081a;
      color: #e0e0e0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .cosmos {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(88, 40, 180, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(40, 100, 200, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(180, 60, 120, 0.04) 0%, transparent 50%);
    }
    .stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    .stars::before {
      content: ''; position: absolute;
      width: 2px; height: 2px; border-radius: 50%; background: white;
      box-shadow:
        25px 50px white, 100px 120px white, 200px 80px white,
        350px 200px white, 50px 300px white, 180px 350px white,
        400px 100px white, 300px 400px white, 150px 180px white,
        450px 320px white, 80px 420px white, 320px 50px white;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle { from { opacity: 0.3; } to { opacity: 0.8; } }

    .container {
      position: relative; z-index: 1;
      max-width: 560px; margin: 0 auto; padding: 40px 20px 60px;
    }
    header { text-align: center; margin-bottom: 32px; }
    header h1 {
      font-size: 28px; font-weight: 700;
      background: linear-gradient(135deg, #b388ff, #7c4dff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    header p { color: #888; font-size: 15px; line-height: 1.6; }

    .form-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 28px 24px;
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 14px; color: #b0b0b0;
      margin-bottom: 6px; font-weight: 500;
    }
    .field label .req { color: #ff6b6b; margin-left: 2px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      color: #fff; font-size: 15px; outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: #b388ff;
    }
    .field textarea { min-height: 100px; resize: vertical; }
    .field select { cursor: pointer; }
    .field select option { background: #1a1a2e; color: #fff; }

    /* File upload */
    .file-zone {
      border: 2px dashed rgba(255,255,255,0.12);
      border-radius: 10px; padding: 20px;
      text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .file-zone:hover { border-color: #b388ff; background: rgba(179,136,255,0.04); }
    .file-zone.has-file { border-color: #66bb6a; border-style: solid; }
    .file-zone .file-label { color: #888; font-size: 14px; }
    .file-zone .file-name { color: #b388ff; font-size: 14px; margin-top: 4px; word-break: break-all; }
    .file-zone .file-progress {
      height: 3px; background: rgba(255,255,255,0.1);
      border-radius: 2px; margin-top: 8px; overflow: hidden;
    }
    .file-zone .file-progress-bar {
      height: 100%; background: #b388ff; width: 0%;
      transition: width 0.3s;
    }
    .file-zone input[type="file"] { display: none; }
    .file-accept { color: #666; font-size: 12px; margin-top: 4px; }

    .field-error { color: #ff6b6b; font-size: 13px; margin-top: 4px; }

    .submit-btn {
      width: 100%; padding: 14px; border-radius: 12px;
      border: none; cursor: pointer;
      background: linear-gradient(135deg, #7c4dff, #b388ff);
      color: #fff; font-size: 16px; font-weight: 600;
      margin-top: 8px; transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .msg-error {
      background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 16px;
      color: #ff6b6b; font-size: 14px;
    }

    /* Success */
    .success-state {
      text-align: center; padding: 60px 20px;
    }
    .success-state .check {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(102,187,106,0.15);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 32px;
    }
    .success-state h2 { font-size: 22px; color: #b388ff; margin-bottom: 12px; }
    .success-state p { color: #888; font-size: 15px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="cosmos"></div>
  <div class="stars"></div>

  <div class="container">
    <header>
      <h1 id="pageTitle">Loading...</h1>
      <p id="pageDesc"></p>
    </header>

    <div class="form-card" id="formCard">
      <div class="msg-error hidden" id="formError"></div>
      <form id="mainForm" novalidate></form>
      <button class="submit-btn" id="submitBtn" type="button">Submit</button>
    </div>

    <div class="form-card success-state hidden" id="successCard">
      <div class="check">&#10003;</div>
      <h2>Submitted!</h2>
      <p id="successMsg"></p>
    </div>
  </div>

<script>
  let cfg = null
  const fileUrls = {}
  const $ = id => document.getElementById(id)

  async function init() {
    try {
      const res = await fetch('/api/config')
      cfg = await res.json()
    } catch {
      $('pageTitle').textContent = 'Error'
      $('pageDesc').textContent = 'Could not load form configuration.'
      return
    }

    document.title = cfg.title + ' | DropKit'
    $('pageTitle').textContent = cfg.title
    $('pageDesc').textContent = cfg.description || ''

    renderForm()
    $('submitBtn').addEventListener('click', handleSubmit)
  }

  function renderForm() {
    const form = $('mainForm')
    form.innerHTML = ''

    for (const field of cfg.fields) {
      const div = document.createElement('div')
      div.className = 'field'
      div.dataset.name = field.name

      const label = document.createElement('label')
      label.setAttribute('for', 'f_' + field.name)
      label.textContent = field.label
      if (field.required) {
        const req = document.createElement('span')
        req.className = 'req'
        req.textContent = ' *'
        label.appendChild(req)
      }
      div.appendChild(label)

      if (field.type === 'textarea') {
        const ta = document.createElement('textarea')
        ta.id = 'f_' + field.name
        ta.name = field.name
        ta.placeholder = field.placeholder || ''
        div.appendChild(ta)
      } else if (field.type === 'select') {
        const sel = document.createElement('select')
        sel.id = 'f_' + field.name
        sel.name = field.name
        const defOpt = document.createElement('option')
        defOpt.value = ''
        defOpt.textContent = '-- Select --'
        sel.appendChild(defOpt)
        for (const opt of (field.options || [])) {
          const o = document.createElement('option')
          o.value = opt
          o.textContent = opt
          sel.appendChild(o)
        }
        div.appendChild(sel)
      } else if (field.type === 'file') {
        const zone = document.createElement('div')
        zone.className = 'file-zone'
        zone.id = 'zone_' + field.name
        zone.innerHTML = `
          <div class="file-label">Click to upload</div>
          <div class="file-name hidden" id="fname_${field.name}"></div>
          <div class="file-progress hidden" id="fprog_${field.name}"><div class="file-progress-bar" id="fbar_${field.name}"></div></div>
          <input type="file" id="f_${field.name}" name="${field.name}" ${field.accept ? 'accept="' + field.accept + '"' : ''}>
        `
        if (field.accept) {
          const hint = document.createElement('div')
          hint.className = 'file-accept'
          hint.textContent = 'Accepted: ' + field.accept
          zone.appendChild(hint)
        }
        zone.addEventListener('click', () => {
          zone.querySelector('input[type="file"]').click()
        })
        zone.querySelector('input[type="file"]').addEventListener('change', (e) => {
          handleFileSelect(field, e.target.files[0])
        })
        div.appendChild(zone)
      } else {
        const inp = document.createElement('input')
        inp.type = field.type || 'text'
        inp.id = 'f_' + field.name
        inp.name = field.name
        inp.placeholder = field.placeholder || ''
        div.appendChild(inp)
      }

      form.appendChild(div)
    }
  }

  async function handleFileSelect(field, file) {
    if (!file) return
    const zone = $('zone_' + field.name)
    const fname = $('fname_' + field.name)
    const prog = $('fprog_' + field.name)
    const bar = $('fbar_' + field.name)

    fname.textContent = file.name
    fname.classList.remove('hidden')
    prog.classList.remove('hidden')
    bar.style.width = '0%'
    zone.classList.remove('has-file')

    const fd = new FormData()
    fd.append('file', file)

    try {
      const xhr = new XMLHttpRequest()
      xhr.open('POST', '/api/upload')

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          bar.style.width = Math.round(e.loaded / e.total * 100) + '%'
        }
      })

      const result = await new Promise((resolve, reject) => {
        xhr.onload = () => {
          try { resolve(JSON.parse(xhr.responseText)) }
          catch { reject(new Error('Invalid response')) }
        }
        xhr.onerror = () => reject(new Error('Upload failed'))
        xhr.send(fd)
      })

      if (result.error) {
        fname.textContent = 'Error: ' + result.error
        return
      }

      fileUrls[field.name] = result.url
      zone.classList.add('has-file')
      fname.textContent = file.name + ' (uploaded)'
      prog.classList.add('hidden')
    } catch (err) {
      fname.textContent = 'Upload failed: ' + err.message
      prog.classList.add('hidden')
    }
  }

  async function handleSubmit() {
    const errEl = $('formError')
    errEl.classList.add('hidden')

    // Gather data
    const data = {}
    for (const field of cfg.fields) {
      if (field.type === 'file') {
        if (fileUrls[field.name]) {
          data[field.name] = fileUrls[field.name]
        } else if (field.required) {
          showError(field.label + ' is required')
          return
        }
      } else {
        const el = $('f_' + field.name)
        data[field.name] = el ? el.value : ''
      }
    }

    // Client-side validation
    for (const field of cfg.fields) {
      const val = data[field.name]
      if (field.required && (!val || !val.trim())) {
        showError(field.label + ' is required')
        return
      }
      if (field.type === 'email' && val && !/.+@.+\..+/.test(val)) {
        showError('Please enter a valid email')
        return
      }
    }

    $('submitBtn').disabled = true
    $('submitBtn').textContent = 'Submitting...'

    try {
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      })
      const result = await res.json()

      if (!res.ok) {
        showError(result.error || 'Submission failed')
        $('submitBtn').disabled = false
        $('submitBtn').textContent = 'Submit'
        return
      }

      $('formCard').classList.add('hidden')
      $('successCard').classList.remove('hidden')
      $('successMsg').textContent = cfg.successMessage || 'Your submission has been received.'
    } catch {
      showError('Network error. Please try again.')
      $('submitBtn').disabled = false
      $('submitBtn').textContent = 'Submit'
    }
  }

  function showError(msg) {
    const el = $('formError')
    el.textContent = msg
    el.classList.remove('hidden')
    el.scrollIntoView({ behavior: 'smooth', block: 'center' })
  }

  init()
</script>
</body>
</html>
