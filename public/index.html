<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>DropKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
      background: #f5f5f0;
      color: #222;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    header { text-align: center; margin-bottom: 32px; }
    header h1 {
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 900;
      letter-spacing: -1px;
      color: #000;
      margin-bottom: 8px;
    }
    header p {
      color: #999;
      font-size: 13px;
      font-weight: 600;
    }

    .form-card {
      background: #fff;
      border: 3px solid #000;
      border-radius: 12px;
      padding: 28px 24px;
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      margin-bottom: 6px;
    }
    .field label .req { color: #e74c3c; }

    .field input, .field select, .field textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 2px solid #eee;
      background: #fff;
      color: #222;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: #000;
    }
    .field textarea { min-height: 100px; resize: vertical; }
    .field select { cursor: pointer; }

    /* File upload */
    .file-zone {
      border: 3px dashed #ddd;
      border-radius: 10px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
      background: #fff;
    }
    .file-zone:hover { border-color: #000; background: #fafaf5; }
    .file-zone.has-file { border-color: #2ecc71; border-style: solid; }
    .file-zone .file-label { color: #999; font-size: 13px; font-weight: 600; }
    .file-zone .file-name { color: #000; font-size: 13px; font-weight: 700; margin-top: 6px; word-break: break-all; }
    .file-zone .file-progress {
      height: 4px; background: #eee;
      border-radius: 2px; margin-top: 10px; overflow: hidden;
    }
    .file-zone .file-progress-bar {
      height: 100%; background: #000; width: 0%;
      transition: width 0.3s;
    }
    .file-zone input[type="file"] { display: none; }
    .file-accept { color: #bbb; font-size: 11px; margin-top: 6px; font-weight: 600; }

    .field-error { color: #e74c3c; font-size: 12px; margin-top: 4px; font-weight: 600; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 3px solid #000;
      cursor: pointer;
      background: #000;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 8px;
      transition: all 0.15s;
    }
    .submit-btn:hover { background: #333; border-color: #333; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .msg-error {
      background: #fff;
      border: 2px solid #e74c3c;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      color: #e74c3c;
      font-size: 12px;
      font-weight: 700;
    }

    /* Success */
    .success-state {
      text-align: center;
      padding: 48px 20px;
    }
    .success-state .check {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 3px solid #2ecc71;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 24px;
      color: #2ecc71;
      font-weight: 900;
    }
    .success-state h2 {
      font-size: 20px;
      font-weight: 900;
      color: #000;
      margin-bottom: 8px;
    }
    .success-state p { color: #999; font-size: 13px; font-weight: 600; }

    .brand {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: #ccc;
      font-weight: 600;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="pageTitle">Loading...</h1>
      <p id="pageDesc"></p>
    </header>

    <div class="form-card" id="formCard">
      <div class="msg-error hidden" id="formError"></div>
      <form id="mainForm" novalidate></form>
      <button class="submit-btn" id="submitBtn" type="button">Submit</button>
    </div>

    <div class="form-card success-state hidden" id="successCard">
      <div class="check">&#10003;</div>
      <h2>Submitted!</h2>
      <p id="successMsg"></p>
    </div>

    <div class="brand">Powered by DropKit</div>
  </div>

<script>
  let cfg = null
  const fileUrls = {}
  const $ = id => document.getElementById(id)

  async function init() {
    try {
      const res = await fetch('/api/config')
      cfg = await res.json()
    } catch {
      $('pageTitle').textContent = 'Error'
      $('pageDesc').textContent = 'Could not load form configuration.'
      return
    }

    document.title = cfg.title + ' | DropKit'
    $('pageTitle').textContent = cfg.title
    $('pageDesc').textContent = cfg.description || ''

    renderForm()
    $('submitBtn').addEventListener('click', handleSubmit)
  }

  function renderForm() {
    const form = $('mainForm')
    form.innerHTML = ''

    for (const field of cfg.fields) {
      const div = document.createElement('div')
      div.className = 'field'
      div.dataset.name = field.name

      const label = document.createElement('label')
      label.setAttribute('for', 'f_' + field.name)
      label.textContent = field.label
      if (field.required) {
        const req = document.createElement('span')
        req.className = 'req'
        req.textContent = ' *'
        label.appendChild(req)
      }
      div.appendChild(label)

      if (field.type === 'textarea') {
        const ta = document.createElement('textarea')
        ta.id = 'f_' + field.name
        ta.name = field.name
        ta.placeholder = field.placeholder || ''
        div.appendChild(ta)
      } else if (field.type === 'select') {
        const sel = document.createElement('select')
        sel.id = 'f_' + field.name
        sel.name = field.name
        const defOpt = document.createElement('option')
        defOpt.value = ''
        defOpt.textContent = '-- Select --'
        sel.appendChild(defOpt)
        for (const opt of (field.options || [])) {
          const o = document.createElement('option')
          o.value = opt
          o.textContent = opt
          sel.appendChild(o)
        }
        div.appendChild(sel)
      } else if (field.type === 'file') {
        const zone = document.createElement('div')
        zone.className = 'file-zone'
        zone.id = 'zone_' + field.name
        zone.innerHTML = `
          <div class="file-label">Click to upload</div>
          <div class="file-name hidden" id="fname_${field.name}"></div>
          <div class="file-progress hidden" id="fprog_${field.name}"><div class="file-progress-bar" id="fbar_${field.name}"></div></div>
          <input type="file" id="f_${field.name}" name="${field.name}" ${field.accept ? 'accept="' + field.accept + '"' : ''}>
        `
        if (field.accept) {
          const hint = document.createElement('div')
          hint.className = 'file-accept'
          hint.textContent = 'Accepted: ' + field.accept
          zone.appendChild(hint)
        }
        zone.addEventListener('click', () => {
          zone.querySelector('input[type="file"]').click()
        })
        zone.querySelector('input[type="file"]').addEventListener('change', (e) => {
          handleFileSelect(field, e.target.files[0])
        })
        div.appendChild(zone)
      } else {
        const inp = document.createElement('input')
        inp.type = field.type || 'text'
        inp.id = 'f_' + field.name
        inp.name = field.name
        inp.placeholder = field.placeholder || ''
        div.appendChild(inp)
      }

      form.appendChild(div)
    }
  }

  async function handleFileSelect(field, file) {
    if (!file) return
    const zone = $('zone_' + field.name)
    const fname = $('fname_' + field.name)
    const prog = $('fprog_' + field.name)
    const bar = $('fbar_' + field.name)

    fname.textContent = file.name
    fname.classList.remove('hidden')
    prog.classList.remove('hidden')
    bar.style.width = '0%'
    zone.classList.remove('has-file')

    const fd = new FormData()
    fd.append('file', file)

    try {
      const xhr = new XMLHttpRequest()
      xhr.open('POST', '/api/upload')

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          bar.style.width = Math.round(e.loaded / e.total * 100) + '%'
        }
      })

      const result = await new Promise((resolve, reject) => {
        xhr.onload = () => {
          try { resolve(JSON.parse(xhr.responseText)) }
          catch { reject(new Error('Invalid response')) }
        }
        xhr.onerror = () => reject(new Error('Upload failed'))
        xhr.send(fd)
      })

      if (result.error) {
        fname.textContent = 'Error: ' + result.error
        return
      }

      fileUrls[field.name] = result.url
      zone.classList.add('has-file')
      fname.textContent = file.name + ' (uploaded)'
      prog.classList.add('hidden')
    } catch (err) {
      fname.textContent = 'Upload failed: ' + err.message
      prog.classList.add('hidden')
    }
  }

  async function handleSubmit() {
    const errEl = $('formError')
    errEl.classList.add('hidden')

    const data = {}
    for (const field of cfg.fields) {
      if (field.type === 'file') {
        if (fileUrls[field.name]) {
          data[field.name] = fileUrls[field.name]
        } else if (field.required) {
          showError(field.label + ' is required')
          return
        }
      } else {
        const el = $('f_' + field.name)
        data[field.name] = el ? el.value : ''
      }
    }

    for (const field of cfg.fields) {
      const val = data[field.name]
      if (field.required && (!val || !val.trim())) {
        showError(field.label + ' is required')
        return
      }
      if (field.type === 'email' && val && !/.+@.+\..+/.test(val)) {
        showError('Please enter a valid email')
        return
      }
    }

    $('submitBtn').disabled = true
    $('submitBtn').textContent = 'Submitting...'

    try {
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      })
      const result = await res.json()

      if (!res.ok) {
        showError(result.error || 'Submission failed')
        $('submitBtn').disabled = false
        $('submitBtn').textContent = 'Submit'
        return
      }

      $('formCard').classList.add('hidden')
      $('successCard').classList.remove('hidden')
      $('successMsg').textContent = cfg.successMessage || 'Your submission has been received.'
    } catch {
      showError('Network error. Please try again.')
      $('submitBtn').disabled = false
      $('submitBtn').textContent = 'Submit'
    }
  }

  function showError(msg) {
    const el = $('formError')
    el.textContent = msg
    el.classList.remove('hidden')
    el.scrollIntoView({ behavior: 'smooth', block: 'center' })
  }

  init()
</script>
</body>
</html>
